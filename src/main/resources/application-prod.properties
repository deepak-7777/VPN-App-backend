# ─────────────────────────────────────────────
# SecureVPN Backend — Production Config (MySQL)
# Usage: Run with --spring.profiles.active=prod
# ─────────────────────────────────────────────

# ─── MySQL Production Database ───────────────
# TODO: Set these as environment variables on your server — never hardcode credentials
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vpndb?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:vpnuser}
spring.datasource.password=${DB_PASSWORD:changeme}

# ─── JPA / Hibernate ────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── H2 console disabled in prod ────────────
spring.h2.console.enabled=false

# ─── Logging (production — minimal) ─────────
logging.level.root=WARN
logging.level.com.securevpn=INFO

# ─── Actuator restricted in prod ────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Server ──────────────────────────────────
server.port=${PORT:8080}
