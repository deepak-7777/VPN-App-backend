spring.application.name=vpn-backend
server.address=0.0.0.0
server.port=8080

# H2 In-Memory DB (local testing)
spring.datasource.url=jdbc:h2:mem:vpndb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=deepak
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=WARN
logging.level.com.securevpn=DEBUG
logging.level.org.springframework.web=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Privacy / Terms
app.privacy.policy.url=https://your-domain.com/privacy-policy
app.privacy.policy.version=1.0
app.privacy.terms.url=https://your-domain.com/terms

# App metadata
app.version=1.0.0
app.name=SecureVPN